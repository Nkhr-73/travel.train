<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉄道乗車記録マップ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f0f0f0;
}

header{
  background:#222;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
  margin-right:10px;
}

#sidebar{
  position:fixed;
  top:0;
  left:-300px;
  width:300px;
  height:100%;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.3);
  transition:0.3s;
  padding:20px;
}

#sidebar.open{
  left:0;
}

#map{
  width:100%;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 地図 */
svg{
  width:90%;
  max-width:600px;
}

.pref{
  fill:#ccc;
  stroke:#333;
  cursor:pointer;
}

.pref.visited{
  fill:#4caf50;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">≡</div>
  <h2>鉄道乗車マップ</h2>
</header>
  
<div class="progress">
  <h4>都道府県完乗率</h4>
  <p id="prefProgress">0%</p>
</div>
  
<div id="sidebar">
  <h3>乗車記録入力</h3>
  <input id="lineInput" placeholder="例：山手線">
  <input id="sectionInput" placeholder="例：新宿〜渋谷">
  <button onclick="addRecord()">記録する</button>
</div>

<div id="map">

<!-- 超簡易 日本地図（テスト用） -->
<svg viewBox="0 0 200 200">

  <!-- 福岡 -->
  <rect id="fukuoka" class="pref" x="20" y="120" width="30" height="20"/>

  <!-- 東京 -->
  <rect id="tokyo" class="pref" x="140" y="100" width="20" height="20"/>

  <!-- 大阪 -->
  <rect id="osaka" class="pref" x="100" y="110" width="25" height="20"/>

</svg>

</div>

<script>
const TOTAL_PREF = 47;
let visitedPrefs = new Set();

document.querySelectorAll(".pref").forEach(pref => {
  pref.addEventListener("click", () => {

    const id = pref.id;

    if (visitedPrefs.has(id)) {
      visitedPrefs.delete(id);
      pref.classList.remove("visited");
    } else {
      visitedPrefs.add(id);
      pref.classList.add("visited");
    }

    updateProgress();
  });
});

function updateProgress(){
  const percent = ((visitedPrefs.size / TOTAL_PREF) * 100).toFixed(1);
  document.getElementById("prefProgress").textContent = percent + "%";
}
  function saveData(){
  localStorage.setItem("visitedPrefs", JSON.stringify([...visitedPrefs]));
}

function loadData(){
  const data = JSON.parse(localStorage.getItem("visitedPrefs") || "[]");
  visitedPrefs = new Set(data);

  visitedPrefs.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.add("visited");
  });

  updateProgress();
}

// ページ読み込み時
loadData();
  saveData();
</script>

</body>
</html>
