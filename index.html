<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理院地図 + Leaflet</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
body{ margin:0; }
#map{
  width:100%;
  height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== 地図初期化 =====
const map = L.map('map').setView([33.59, 130.42], 10); // 博多あたり

// ===== 地理院タイル =====
L.tileLayer(
  "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
  {
    attribution: "© 国土地理院",
    maxZoom: 18
  }
).addTo(map);

// ===== クリックでマーカー追加 =====
map.on('click', function(e){
  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  L.marker([lat, lng])
    .addTo(map)
    .bindPopup(`緯度:${lat.toFixed(4)}<br>経度:${lng.toFixed(4)}`)
    .openPopup();
});
</script>

</body>
</html>
