<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉄道乗車記録マップ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f0f0f0;
}

/* ヘッダー */
header{
  background:#222;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
  margin-right:10px;
}

/* サイドメニュー */
#sidebar{
  position:fixed;
  top:0;
  left:-300px;
  width:300px;
  height:100%;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.3);
  transition:0.3s;
  padding:20px;
  overflow:auto;
}

#sidebar.open{
  left:0;
}

/* 地図エリア */
#map{
  width:100%;
  height:90vh;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 入力フォーム */
input, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:14px;
}

.progress{
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">≡</div>
  <h2>鉄道乗車マップ</h2>
</header>

<!-- サイドバー -->
<div id="sidebar">
  <h3>乗車記録入力</h3>

  <input id="lineInput" placeholder="例：山手線">
  <input id="sectionInput" placeholder="例：新宿〜渋谷">

  <button onclick="addRecord()">記録する</button>

  <div class="progress">
    <h4>完乗率（仮）</h4>
    <p>路線：--%</p>
    <p>都道府県：--%</p>
  </div>
</div>

<!-- 地図 -->
<div id="map">
  <p>ここに日本地図を表示（後で実装）</p>
</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

// 仮のデータ保存
let records = [];

function addRecord(){
  const line = document.getElementById("lineInput").value;
  const section = document.getElementById("sectionInput").value;

  if(!line || !section){
    alert("ちゃんと入力してくれ笑");
    return;
  }

  records.push({line, section});
  alert(line + " " + section + " を記録した");

  console.log(records);
}
</script>

</body>
</html>
