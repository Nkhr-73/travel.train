<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理院地図 + Leaflet</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
body{ margin:0; }
#map{
  width:100%;
  height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== 地図初期化 =====
const map = L.map('map').setView([33.59, 130.42], 10); // 博多あたり

// ===== 地理院タイル =====
L.tileLayer(
  "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
  {
    attribution: "© 国土地理院",
    maxZoom: 18
  }
).addTo(map);

// ===== クリックでマーカー追加 =====
map.on('click', function(e){
  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  L.marker([lat, lng])
    .addTo(map)
    .bindPopup(`緯度:${lat.toFixed(4)}<br>経度:${lng.toFixed(4)}`)
    .openPopup();
});
  // ===== 鹿児島本線（門司港〜博多） =====
const kagoshimaLine = [
  const stations = [
  { name: "門司港", lat: 33.9472, lon: 130.9603 },
  { name: "小森江", lat: 33.9095, lon: 130.9350 },
  { name: "門司", lat: 33.9034, lon: 130.9326 },
  { name: "小倉", lat: 33.8833, lon: 130.8829 },
  { name: "西小倉", lat: 33.8830, lon: 130.8730 },
  { name: "九州工大前", lat: 33.8635, lon: 130.8412 },
  { name: "戸畑", lat: 33.8572, lon: 130.8276 },
  { name: "枝光", lat: 33.8464, lon: 130.8105 },
  { name: "スペースワールド", lat: 33.8390, lon: 130.7995 },
  { name: "八幡", lat: 33.8458, lon: 130.7689 },
  { name: "黒崎", lat: 33.8522, lon: 130.7652 },
  { name: "陣原", lat: 33.8503, lon: 130.7403 },
  { name: "折尾", lat: 33.8626, lon: 130.7115 },
  { name: "水巻", lat: 33.8601, lon: 130.6783 },
  { name: "遠賀川", lat: 33.8477, lon: 130.6545 },
  { name: "海老津", lat: 33.8206, lon: 130.6208 },
  { name: "教育大前", lat: 33.7946, lon: 130.6010 },
  { name: "赤間", lat: 33.7853, lon: 130.5803 },
  { name: "東郷", lat: 33.7990, lon: 130.5583 },
  { name: "東福間", lat: 33.7883, lon: 130.5330 },
  { name: "福間", lat: 33.7772, lon: 130.5102 },
  { name: "千鳥", lat: 33.7638, lon: 130.4874 },
  { name: "古賀", lat: 33.7572, lon: 130.4680 },
  { name: "ししぶ", lat: 33.7395, lon: 130.4478 },
  { name: "新宮中央", lat: 33.7163, lon: 130.4461 },
  { name: "福工大前", lat: 33.7083, lon: 130.4390 },
  { name: "九産大前", lat: 33.6946, lon: 130.4268 },
  { name: "香椎", lat: 33.6687, lon: 130.4313 },
  { name: "千早", lat: 33.6498, lon: 130.4305 },
  { name: "箱崎", lat: 33.6232, lon: 130.4330 },
  { name: "吉塚", lat: 33.6022, lon: 130.4383 },
  { name: "博多", lat: 33.5902, lon: 130.4206 }
];
];

// ===== マーカー表示 =====
kagoshimaLine.forEach(st => {
  L.marker([st.lat, st.lng])
    .addTo(map)
    .bindPopup(st.name);
  L.polyline(
  kagoshimaLine.map(st => [st.lat, st.lng]),
  {weight: 4}
).addTo(map);
});
</script>

</body>
</html>
