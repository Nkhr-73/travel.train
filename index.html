<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福岡 鉄道マップ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  text-align:center;
  background:#f0f0f0;
}

#map-container{
  position:relative;
  width:90%;
  max-width:500px;
  margin:20px auto;
}

/* 白地図 */
#map{
  width:100%;
}

/* 駅 */
.station{
  position:absolute;
  width:12px;
  height:12px;
  background:red;
  border-radius:50%;
  transform:translate(-50%, -50%);
  cursor:pointer;
}

.station.visited{
  background:green;
}

#progress{
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>福岡 鉄道乗車マップ</h2>

<div id="map-container">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Fukuoka_Prefecture_Map.svg/512px-Fukuoka_Prefecture_Map.svg.png" id="map">

  <!-- 駅（仮配置） -->
  <div class="station" style="top:45%; left:50%;" data-name="博多"></div>
  <div class="station" style="top:48%; left:52%;" data-name="吉塚"></div>
  <div class="station" style="top:50%; left:55%;" data-name="香椎"></div>
  <div class="station" style="top:46%; left:47%;" data-name="竹下"></div>
  <div class="station" style="top:44%; left:53%;" data-name="箱崎"></div>

</div>

<div id="progress">完乗率：0%</div>

<script>
const stations = document.querySelectorAll(".station");
let visited = new Set();

// ロード
function load(){
  const data = JSON.parse(localStorage.getItem("stations") || "[]");
  visited = new Set(data);

  stations.forEach(st=>{
    if(visited.has(st.dataset.name)){
      st.classList.add("visited");
    }
  });

  update();
}

// セーブ
function save(){
  localStorage.setItem("stations", JSON.stringify([...visited]));
}

// 更新
function update(){
  const percent = ((visited.size / stations.length) * 100).toFixed(1);
  document.getElementById("progress").textContent = "完乗率：" + percent + "%";
}

// クリック処理
stations.forEach(st=>{
  st.addEventListener("click", ()=>{
    const name = st.dataset.name;

    if(visited.has(name)){
      visited.delete(name);
      st.classList.remove("visited");
    }else{
      visited.add(name);
      st.classList.add("visited");
    }

    update();
    save();
  });
});

// 初期化
load();
</script>

</body>
</html>
