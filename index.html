<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鉄道乗車</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f0f0f0;
}

header{
  background:#222;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
  margin-right:10px;
}

#sidebar{
  position:fixed;
  top:0;
  left:-300px;
  width:300px;
  height:100%;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.3);
  transition:0.3s;
  padding:20px;
  overflow:auto;
}

#sidebar.open{
  left:0;
}

#map{
  width:100%;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 地図 */
svg{
  width:90%;
  max-width:700px;
}

.pref{
  fill:#ccc;
  stroke:#333;
  cursor:pointer;
}

.pref.visited{
  fill:#4caf50;
}

.progress{
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">≡</div>
  <h2>鉄道乗車マップ</h2>
</header>

<div id="sidebar">
  <h3>都道府県完乗率</h3>
  <p id="prefProgress">0%</p>
</div>

<div id="map">

<!-- 安定して動く日本地図（簡略版） -->
<svg viewBox="0 0 300 200">

  <rect id="fukuoka" class="pref" x="20" y="120" width="40" height="25"/>
  <rect id="osaka" class="pref" x="120" y="110" width="40" height="25"/>
  <rect id="tokyo" class="pref" x="220" y="100" width="40" height="25"/>
  <rect id="hokkaido" class="pref" x="180" y="20" width="60" height="40"/>

</svg>

</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

// ===== 完乗率ロジック =====
const TOTAL_PREF = 47;
let visitedPrefs = new Set();

// ロード
function loadData(){
  const saved = JSON.parse(localStorage.getItem("visitedPrefs") || "[]");
  visitedPrefs = new Set(saved);

  visitedPrefs.forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.add("visited");
  });

  updateProgress();
}

// セーブ
function saveData(){
  localStorage.setItem("visitedPrefs", JSON.stringify([...visitedPrefs]));
}

// 更新
function updateProgress(){
  const percent = ((visitedPrefs.size / TOTAL_PREF) * 100).toFixed(1);
  document.getElementById("prefProgress").textContent = percent + "%";
}

// クリック処理
document.querySelectorAll(".pref").forEach(pref=>{
  pref.addEventListener("click", ()=>{
    const id = pref.id;

    if(visitedPrefs.has(id)){
      visitedPrefs.delete(id);
      pref.classList.remove("visited");
    }else{
      visitedPrefs.add(id);
      pref.classList.add("visited");
    }

    updateProgress();
    saveData();
  });
});

// 初期化
loadData();
</script>

</body>
</html>
